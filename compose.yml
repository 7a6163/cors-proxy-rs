services:
  cors-proxy:
    image: ghcr.io/7a6163/cors-proxy-rs:latest
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - RATE_LIMIT=60
      - ALLOWED_ORIGINS=https://myapp.com,https://staging.myapp.com
      - BLOCK_PRIVATE_IPS=true
      - TIMEOUT_SECS=30
    restart: unless-stopped
